name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.label }}

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Toolchains
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux system libraries
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Python dependencies + PyInstaller
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # Get Rust target triple (used to name the sidecar binary)
      - name: Get target triple
        id: triple
        shell: bash
        run: echo "value=$(rustc -vV | sed -n 's|host: ||p')" >> "$GITHUB_OUTPUT"

      # Build PyInstaller sidecar (Unix)
      - name: Build Python sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 -m PyInstaller subtracker-backend.spec --clean --noconfirm
          mkdir -p src-tauri/binaries
          cp dist/subtracker-backend \
            "src-tauri/binaries/subtracker-backend-${{ steps.triple.outputs.value }}"
          chmod +x \
            "src-tauri/binaries/subtracker-backend-${{ steps.triple.outputs.value }}"

      # Build PyInstaller sidecar (Windows)
      - name: Build Python sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller subtracker-backend.spec --clean --noconfirm
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Copy-Item "dist\subtracker-backend.exe" `
            "src-tauri\binaries\subtracker-backend-${{ steps.triple.outputs.value }}.exe"

      # Node dependencies
      - name: Install root Node dependencies
        run: npm install

      - name: Install frontend Node dependencies
        run: npm --prefix frontend install

      # Icons are pre-generated and committed; no re-generation needed in CI.

      # Build Tauri app
      - name: Build Tauri app
        run: npm run tauri:build

      # Collect and upload release artifacts
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
